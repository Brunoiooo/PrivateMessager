services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - messager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    restart: unless-stopped
    expose:
      - "${API_BIND_PORT}"
    environment:
      API_BIND_IP: ${API_BIND_IP}
      API_BIND_PORT: ${API_BIND_PORT}
      POSTGRES_CONNECTION_STRING: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY}
      MESSAGE_TTL_DAYS: ${MESSAGE_TTL_DAYS:-30}
    networks:
      - messager-net
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_EXTERNAL_PORT:-443}:${NGINX_EXTERNAL_PORT:-443}"
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/generate-nginx-config.sh:/generate-nginx-config.sh:ro
      - ./ssl:/etc/ssl/messager:ro
    environment:
      API_BIND_PORT: ${API_BIND_PORT}
      NGINX_USE_SSL: ${NGINX_USE_SSL:-true}
      NGINX_EXTERNAL_PORT: ${NGINX_EXTERNAL_PORT:-443}
    command: >
      /bin/sh -c "sh /generate-nginx-config.sh
      && nginx -g 'daemon off;'"
    networks:
      - messager-net
    depends_on:
      - api

  android-builder:
    build:
      context: App
      dockerfile: Dockerfile.android
    volumes:
      - ./App:/app
      - /app/node_modules
      - android-gradle:/root/.gradle
      - ./releases/android:/releases
      - ./ssl:/ssl:ro
      - ./App/scripts/build-android.sh:/build-android.sh:ro
    environment:
      MESSAGER_API_BASE_URL: ${MESSAGER_API_BASE_URL}
      SSL_CA_CERT_FILE: ${SSL_CA_CERT_FILE:-ca.pem}
    command: sh /build-android.sh
    networks:
      - messager-net
    depends_on:
      api:
        condition: service_started
    restart: "no"
    profiles:
      - release

networks:
  messager-net:
    driver: bridge

volumes:
  db-data:
  android-gradle:
